server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Expo Router (output: static): sirve /ruta.html y cae a index.html
    # para las rutas manejadas por el cliente (evita 404 al refrescar).
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Assets con hash en el nombre: cache larga.
    location /_expo/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
